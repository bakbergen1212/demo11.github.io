<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>🌱 ECO-LOGIC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#4CAF50">
  <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoi8J+cIOKCsCIsInNob3J0X25hbWUiOiLigqE8L3RleHQ+PC9zdmc+">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{--green:#4CAF50;--green-dark:#2E7D32;--blue:#2196F3;--gray:#666;--shadow:0 8px 32px rgba(0,0,0,.12);}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#E8F5E8,#C8E6C9);min-height:100vh;color:#1a1a1a;overflow-x:hidden;touch-action:manipulation;padding-bottom:env(safe-area-inset-bottom);}
    .hero{background:linear-gradient(135deg,var(--green),var(--green-dark));color:white;text-align:center;padding:clamp(40px,15vh,80px) 20px 40px;}
    .hero h1{font-size:clamp(1.8rem,8vw,3rem);font-weight:800;margin-bottom:12px;}
    .hero .subtitle{font-size:clamp(1rem,4vw,1.2rem);opacity:.95;max-width:90vw;margin:0 auto;line-height:1.4;}
    .container{max-width:100%;margin:0 auto;padding:20px 20px 100px;}
    .card{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:24px;padding:clamp(24px,6vw,32px);box-shadow:var(--shadow);margin-bottom:24px;border:1px solid rgba(255,255,255,.8);}
    .input-group{margin-bottom:20px;}
    label{display:block;margin-bottom:8px;font-weight:600;color:var(--green-dark);font-size:clamp(.85rem,3.5vw,.95rem);}
    input,select{width:100%;padding:clamp(14px,5vw,18px) 20px;border:2px solid #E8F0FE;border-radius:16px;font-size:clamp(16px,5vw,18px);font-weight:500;background:rgba(255,255,255,.8);transition:all .2s ease;}
    input:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(76,175,80,.15);background:white;outline:none;}
    select{background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 16px center;background-size:20px;padding-right:50px;}
    .price-group{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
    .btn{padding:clamp(16px,6vw,20px) 24px;border:none;border-radius:16px;font-size:clamp(16px,4.5vw,18px);font-weight:600;cursor:pointer;transition:all .2s ease;width:100%;margin:8px 0;min-height:56px;position:relative;}
    .btn-primary{background:linear-gradient(135deg,var(--green),var(--green-dark));color:white;box-shadow:0 4px 16px rgba(76,175,80,.3);}
    .btn-primary:active{transform:scale(.98);}
    .btn-secondary{background:linear-gradient(135deg,var(--blue),#1976D2);color:white;}
    .action-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);padding:16px;border-top:1px solid #E0E7FF;display:none;z-index:1000;box-shadow:0 -4px 20px rgba(0,0,0,.1);}
    .action-bar.show{display:flex;gap:12px;flex-wrap:wrap;}
    #result{display:none;background:linear-gradient(135deg,rgba(241,248,233,.95),rgba(232,245,232,.95));border-radius:24px;padding:clamp(24px,8vw,40px);margin:24px -20px;border:1px solid rgba(76,175,80,.2);}
    .metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin:24px 0;}
    .metric{background:rgba(255,255,255,.9);padding:20px 12px;border-radius:20px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.08);}
    .metric-value{font-size:clamp(1.5rem,8vw,2.2rem);font-weight:800;color:var(--green-dark);margin-bottom:8px;}
    .metric label{font-size:clamp(.75rem,3vw,.9rem);color:var(--gray);font-weight:500;display:block;line-height:1.3;}
    .metric small{display:block;font-size:.8em;opacity:.8;}
    .eco-tip{font-size:clamp(1.1rem,5vw,1.4rem);font-weight:700;text-align:center;margin:20px 0;padding:16px;background:rgba(76,175,80,.1);border-radius:16px;border-left:5px solid var(--green);}
    #chart{max-height:clamp(280px,45vw,380px);border-radius:20px;margin:24px 0;}
    .debug{padding:16px;border-radius:16px;margin:16px 0;font-weight:600;display:none;text-align:center;}
    .footer{text-align:center;padding:24px 20px;color:var(--gray);font-size:.9rem;opacity:.8;}
    .loading .btn::after{content:'';position:absolute;right:20px;top:50%;margin-top:-10px;width:20px;height:20px;border:2px solid transparent;border-top:2px solid white;border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <section class="hero">
    <h1>🌱 ECO-LOGIC</h1>
    <p class="subtitle">СВОИ ЦЕНЫ KZT • Кызылорда</p>
  </section>

  <div class="container">
    <div class="card">
      <div class="input-group">
        <label>📏 Площадь (га)</label>
        <input id="area" type="number" value="1" min="0.1" max="1000" inputmode="decimal">
      </div>
      
      <div class="input-group">
        <label>🌾 Культура</label>
        <select id="crop">
          <option value="рис">Рис (200кг/га)</option>
          <option value="пшеница">Пшеница (130кг/га)</option>
          <option value="томаты">Томаты (0.3кг/га)</option>
          <option value="кукуруза">Кукуруза (25кг/га)</option>
        </select>
      </div>
      
      <div class="input-group">
        <label>🌱 Почва</label>
        <select id="soil">
          <option value="низкое">Низкое (+20%)</option>
          <option value="среднее" selected>Среднее</option>
          <option value="высокое">Высокое (-20%)</option>
        </select>
      </div>
      
      <div class="input-group">
        <label>🌧️ Дождь (мм/мес)</label>
        <input id="rain" type="number" value="50" min="0" max="1000" inputmode="numeric">
      </div>

      <!-- ✅ НОВЫЕ ПОЛЯ ЦЕН -->
      <div class="input-group">
        <label>💰 Ваши цены (₸/кг или ₸/л)</label>
        <div class="price-group">
          <div>
            <label>🌾 Семена</label>
            <input id="priceSeeds" type="number" value="160" inputmode="numeric">
          </div>
          <div>
            <label>🧪 Удобрения</label>
            <input id="priceFert" type="number" value="200" inputmode="numeric">
          </div>
        </div>
        <div class="price-group">
          <div>
            <label>💧 Вода (₸/л)</label>
            <input id="priceWater" type="number" value="0.15" step="0.01" inputmode="decimal">
          </div>
        </div>
      </div>

      <button class="btn btn-secondary" onclick="loadWeather()">☁️ Погода Кызылорды</button>
      <button class="btn btn-primary" onclick="calculate()">🚀 Рассчитать ₸</button>
    </div>

    <div id="result">
      <h2 id="res-title"></h2>
      <div id="metrics" class="metric-row"></div>
      <div id="res-text" class="eco-tip"></div>
      <canvas id="chart"></canvas>
    </div>
    <div id="debug" class="debug"></div>
  </div>

  <div class="action-bar" id="actionBar">
    <button class="btn btn-primary" onclick="exportCSV()" id="csvBtn" disabled>📥 CSV</button>
    <button class="btn btn-secondary" onclick="exportPDF()" id="pdfBtn" disabled>📄 PDF</button>
  </div>

  <script>
    const API_KEY = 'a9250a2e550f2e389ac64a01930fdf31';
    let chartInstance = null;
    let lastCalcData = null;

    function debug(msg, success=false) {
      const el = document.getElementById('debug');
      el.textContent = msg;
      el.style.background = success ? 'rgba(76,175,80,0.1)' : 'rgba(244,67,54,0.1)';
      el.style.borderLeftColor = success ? '#4CAF50' : '#F44336';
      el.style.color = success ? '#2E7D32' : '#D32F2F';
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    function setLoading(state) {
      document.body.classList.toggle('loading', state);
    }

    async function loadWeather() {
      setLoading(true);
      try {
        const res = await fetch('https://api.openweathermap.org/data/2.5/weather?lat=44.85&lon=65.50&appid='+API_KEY+'&units=metric');
        const data = await res.json();
        let rain = 50;
        if (data.rain && data.rain['1h']) rain = Math.round(data.rain['1h'] * 720);
        document.getElementById('rain').value = rain;
        debug(`✅ Погода: ${rain} мм/мес`, true);
        calculate();
      } catch(e) {
        document.getElementById('rain').value = 150;
        debug('🌤️ Симуляция: 150 мм/мес');
        calculate();
      } finally {
        setLoading(false);
      }
    }

    function calculate() {
      try {
        // ✅ ПОЛУЧАЕМ ВСЕ ЗНАЧЕНИЯ
        const area = parseFloat(document.getElementById('area').value) || 1;
        const crop = document.getElementById('crop').value;
        const soil = document.getElementById('soil').value;
        const rain = parseFloat(document.getElementById('rain').value) || 50;
        
        // ✅ СВОИ ЦЕНЫ ПОЛЬЗОВАТЕЛЯ
        const priceSeeds = parseFloat(document.getElementById('priceSeeds').value) || 160;
        const priceFert = parseFloat(document.getElementById('priceFert').value) || 200;
        const priceWater = parseFloat(document.getElementById('priceWater').value) || 0.15;

        if (area < 0.1 || area > 1000) throw new Error('Площадь 0.1-1000 га');

        // ✅ НОРМЫ ПО КУЛЬТУРАМ (кг/га, л/га)
        const crops = {
          рис: {seeds:400, fert:150, water:8000, name:'Рис'},
          пшеница: {seeds:200, fert:120, water:4000, name:'Пшеница'},
          томаты: {seeds:20000, fert:200, water:5000, name:'Томаты'},
          кукуруза: {seeds:250, fert:180, water:6000, name:'Кукуруза'}
        };

        const item = crops[crop];
        const soilMult = {низкое:1.2, среднее:1, высокое:0.8}[soil];
        
        // ✅ РАСХОДЫ
        const seedsKg = Math.round(item.seeds * area * soilMult);
        const fertKg = Math.round(item.fert * area * soilMult);
        const baseWaterL = item.water * area * 10000;
        const savedWaterL = rain * area * 1000;
        const waterL = Math.max(0, baseWaterL - savedWaterL);
        
        // ✅ СТОИМОСТЬ (СВОИ ЦЕНЫ!)
        const seedsCost = Math.round(seedsKg * priceSeeds);
        const fertCost = Math.round(fertKg * priceFert);
        const waterCost = Math.round(waterL * priceWater);
        const totalCost = seedsCost + fertCost + waterCost;

        lastCalcData = {
          area, crop: item.name, seedsKg, fertKg, waterL, savedWaterL,
          priceSeeds, priceFert, priceWater,
          seedsCost, fertCost, waterCost, totalCost, item
        };

        // ✅ UI
        document.getElementById('res-title').textContent = `${area} га ${item.name}: ${totalCost.toLocaleString()} ₸`;
        
        document.getElementById('metrics').innerHTML = `
          <div class="metric">
            <div class="metric-value">${seedsKg.toLocaleString()}</div>
            <label>🌾 Семена (${priceSeeds}₸/кг)<br><small>${seedsCost.toLocaleString()} ₸</small></label>
          </div>
          <div class="metric">
            <div class="metric-value">${fertKg.toLocaleString()}</div>
            <label>🧪 Удобрения (${priceFert}₸/кг)<br><small>${fertCost.toLocaleString()} ₸</small></label>
          </div>
          <div class="metric">
            <div class="metric-value">${Math.round(waterL/1000).toLocaleString()}</div>
            <label>💧 Вода (${priceWater}₸/л)<br><small>${waterCost.toLocaleString()} ₸</small></label>
          </div>
          <div class="metric">
            <div class="metric-value">${totalCost.toLocaleString()}</div>
            <label>💰 ИТОГО<br><small>${Math.round(totalCost/area).toLocaleString()} ₸/га</small></label>
          </div>
        `;

        document.getElementById('res-text').innerHTML = `
          💧 Экономия воды: <strong>${savedWaterL.toLocaleString()} л</strong><br>
          <strong>Ваши цены: семена ${priceSeeds}₸ | удобрения ${priceFert}₸ | вода ${priceWater}₸/л</strong>
        `;

        document.getElementById('result').style.display = 'block';
        document.getElementById('csvBtn').disabled = false;
        document.getElementById('pdfBtn').disabled = false;
        document.getElementById('actionBar').classList.add('show');
        
        updateChart(seedsKg, fertKg, waterL/1000, totalCost/100000, '#4CAF50');
        debug(`✅ ${totalCost.toLocaleString()} ₸ (ваши цены)`, true);

      } catch(e) {
        debug('❌ ' + e.message);
      }
    }

    function updateChart(seeds, fert, water, total) {
      const ctx = document.getElementById('chart').getContext('2d');
      if (chartInstance) chartInstance.destroy();
      
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Семена', 'Удобрения', 'Вода', 'Итого (тыс.₸)'],
          datasets: [{
            data: [seeds/100, fert/100, water/10, total],
            backgroundColor: ['#FF5722', '#FF9800', '#2196F3', '#4CAF50'],
            borderWidth: 3,
            borderColor: '#fff'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { title: { display: true, text: '📊 Ваши затраты KZT' } }
        }
      });
    }

    function exportCSV() {
      if (!lastCalcData) return;
      const d = lastCalcData;
      const csv = `Площадь(га),Культура,Семена(кг/${d.priceSeeds}₸),Удобрения(кг/${d.priceFert}₸),Вода(л/${d.priceWater}₸),Итого(₸)\n` +
                  `${d.area},${d.crop},${d.seedsKg},${d.fertKg},${d.waterL},${d.totalCost}`;
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `ecofarm_${d.crop}_${d.area}га_${d.totalCost}₸.csv`;
      a.click();
      debug('📥 CSV готов!', true);
    }

    function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const d = lastCalcData;
      
      doc.setFontSize(20);
      doc.text('🌱 ECO-LOGIC • ВАШИ ЦЕНЫ', 105, 25, { align: 'center' });
      doc.setFontSize(14);
      doc.text(`${d.crop} | ${d.area} га`, 20, 50);
      doc.text(`ИТОГО: ${d.totalCost.toLocaleString()} ₸`, 20, 65);
      doc.text(`Семена: ${d.seedsKg}кг × ${d.priceSeeds}₸ = ${d.seedsCost}₸`, 20, 80);
      doc.text(`Удобрения: ${d.fertKg}кг × ${d.priceFert}₸ = ${d.fertCost}₸`, 20, 95);
      doc.text(`Вода: ${Math.round(d.waterL/1000)}м³ × ${d.priceWater}₸/л = ${d.waterCost}₸`, 20, 110);
      
      doc.save(`ecofarm_${d.crop}_ваши_цены.pdf`);
      debug('📄 PDF готов!', true);
    }

    // Enter = calculate
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });

    window.onload = () => debug('🚀 Введите свои цены → Рассчитать!', true);
  </script>
</body>
</html>
